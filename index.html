<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Animado | Leonardo De la Torre</title>
    <style>
        /* Estilos Generales para el Efecto */
        body { font-family: sans-serif; background: #222; color: white; padding: 0; margin: 0; }
        .full-page { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 2rem;}

        /* Contenedor del Efecto */
        #hex-grid { display: flex; flex-direction: column; align-items: center; padding: 50px 0; background: #1a1a1a;}

        /* Estilo del Contenedor Hexagonal Base */
        .hex-item {
            width: 300px;
            height: 350px;
            background: #333;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
            margin: -30px 0; /* Entrelazado */
            padding: 20px;
            
            /* El Truco del Hexágono: CSS Clip-Path */
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            
            /* Estado Inicial: Invisible y desplazado */
            opacity: 0;
            transform: translateY(100px) scale(0.8);
            transition: all 0.8s ease-out; /* Velocidad de la Animación */
        }

        /* Estilo para los hexágonos de la izquierda */
        .hex-item.hex-left { transform: translateX(-150px) translateY(100px) scale(0.8); }
        /* Estilo para los hexágonos de la derecha */
        .hex-item.hex-right { transform: translateX(150px) translateY(100px) scale(0.8); }

        /* CLASE ACTIVA: Se activa al hacer scroll por JS */
        .hex-item.appear {
            opacity: 1;
            transform: translateX(0) translateY(0) scale(1) !important;
        }

        /* Estilos Internos de Información */
        .hex-item h4 { margin: 0 0 10px; font-size: 1.4rem; color: #ffca28; }
        .hex-item p { font-size: 0.9rem; margin: 0; }
        .tech-stack { font-size: 0.8rem; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; display: inline-block; margin: 5px 2px; }
    </style>
</head>
<body>

    <section class="full-page">
        <h1>Baja para ver mis proyectos...</h1>
    </section>

    <section id="hex-grid">
        
        <div class="hex-item hex-left js-scroll-item">
            <h4>Panimii Bakery</h4>
            <p>Plataforma E-commerce para aumentar ventas y retención de clientes.</p>
            <div>
                <span class="tech-stack">Django</span>
                <span class="tech-stack">Stripe</span>
            </div>
        </div>

        <div class="hex-item hex-right js-scroll-item">
            <h4>Revista Gremial</h4>
            <p>Transformación digital de medio estático a plataforma B2B interactiva.</p>
            <div>
                <span class="tech-stack">SQL</span>
                <span class="tech-stack">Backend</span>
            </div>
        </div>

    </section>

    <section class="full-page">
        <h2>¿Listo para tu proyecto?</h2>
    </section>

    <script>
        // Función para detectar scroll y activar animaciones
        const scrollObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    // Cuando entra en pantalla, le agregamos la clase 'appear'
                    entry.target.classList.add('appear');
                    // Una vez que aparece, dejamos de vigilarlo para mejorar performance
                    scrollObserver.unobserve(entry.target);
                }
            });
        });

        // Buscamos todos los elementos con la clase js-scroll-item
        const elementsToAnimate = document.querySelectorAll('.js-scroll-item');
        
        // Ponemos a vigilar cada elemento
        elementsToAnimate.forEach((element) => {
            scrollObserver.observe(element);
        });
    </script>

</body>
</html>
