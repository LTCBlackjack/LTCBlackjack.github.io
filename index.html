<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Leonard | Soluciones Digitales y B2B</title>
    <style>
        /* Diseño puro, corporativo y alineado al minimalismo de tu logo */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            margin: 0; padding: 0;
            background-color: #ffffff;
            color: #111111;
        }

        nav {
            padding: 20px 10%;
        }

        #hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 75vh;
            padding: 0 10%;
        }

        .hero-text {
            flex: 1;
            max-width: 50%;
        }

        .hero-text h1 {
            font-size: 3.2rem;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .hero-text p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
        }

        .btn-cta {
            display: inline-block;
            padding: 12px 30px;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 2px;
            transition: background 0.3s ease;
        }

        .btn-cta:hover {
            background-color: #333333;
        }

        /* Contenedor reservado para la animación de Lottie */
        .hero-visual {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 500px;
        }

        #lottie-container {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <nav>
        <img src="tu-logo.png" alt="Leonard Logo" style="height: 80px;">
    </nav>

    <header id="hero">
        <div class="hero-text">
            <h1>Ingeniería Web B2B y Arquitectura Cloud</h1>
            <p>Sistemas robustos, integraciones backend complejas y automatización para escalar el rendimiento corporativo.</p>
            <a href="mailto:tu-correo@gmail.com" class="btn-cta">Inicia tu Proyecto</a>
        </div>

        <div class="hero-visual">
            <div id="lottie-container"></div>
        </div>
    </header>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    
    <script>
        var animation = lottie.loadAnimation({
            container: document.getElementById('lottie-container'),
            renderer: 'svg', // Mantiene los vectores súper nítidos y 100% bidimensionales
            loop: true,
            autoplay: true,
            
            /* PASO CLAVE:
               Aquí debes pegar la ruta de tu propia animación corporativa en .json.
               Por ahora dejé un enlace a una animación genérica alojada en internet 
               para que al abrir el archivo veas el efecto funcionando de inmediato. */
            path: 'https://assets2.lottiefiles.com/packages/lf20_w51pcehl.json' 
        });
    </script>
</body>
</html>
